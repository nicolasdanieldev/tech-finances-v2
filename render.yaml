services:
  - type: web
    name: tech-finances-v2
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run deploy:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
